<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Booble Web v1.0</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: #151515; border: 1px solid #00ffcc; display: flex; flex-direction: column; border-radius: 10px; box-shadow: 0 0 20px #00ffcc44; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #333; }
        .msg { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #00ffcc; }
        #input-area { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; outline: none; }
        input:focus { border-color: #00ffcc; }
        button { background: #00ffcc; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #00ccaa; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div style="text-align:center; padding: 10px; font-weight: bold; font-size: 20px;">BOOBLE WEB</div>
        <div id="messages">
            <div class="msg"><b>Система:</b> Ласкаво просимо до Booble!</div>
        </div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Напишіть щось...">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg';
                msgDiv.innerHTML = `<b>Ви:</b> ${input.value}`;
                document.getElementById('messages').appendChild(msgDiv);
                input.value = "";
                // Авто-прокрутка вниз
                const container = document.getElementById('messages');
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>
</html>
